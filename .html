<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Primeiro Site</title>

  <style>

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
    }

    .container {
      margin-top: 100px;
      background-color: rgba(0,0,0,0.3);
      width: 80%;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 50px;
      color: #ffe600;
      margin-bottom: 20px;
      text-shadow: 2px 2px 5px black;
    }

    p {
      font-size: 20px;
      line-height: 1.8;
      margin: 15px 0;
    }

    button {
      margin-top: 25px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background-color: #ff0000;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #cc0000;
      transform: scale(1.05);
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Meu Primeiro Site</h1>

    <p>Este site foi feito para testar HTML.</p>

    <p>Estou muito animado para aprender!</p>

    <p>HTML é importante porque é o esqueleto do site.</p>

    <button>Clique Aqui</button>
 
  </div>

</body>
</html>
